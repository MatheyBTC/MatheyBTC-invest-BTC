name: Actualizar Precios BTC

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC diario
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Actualizar precios y dashboard
        run: python update_prices.py

      - name: Commitear cambios
        run: |
          git config user.name "invest-bot"
          git config user.email "bot@invest"
          git add btc_prices.json dashboard.html
          git diff --staged --quiet || git commit -m "chore: actualizar precios BTC"
          git push
